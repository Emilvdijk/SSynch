<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SSynch</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        width: 260px;
        margin: 0;
        padding: 14px;
        background: #131316;
        color: #f2f2f2;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      section {
        margin-bottom: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      section:last-child {
        border-bottom: none;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 8px;
        margin-bottom: 6px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        color: #f2f2f2;
        font: inherit;
      }
      input::placeholder {
        color: #888;
      }
      input:focus {
        outline: none;
        border-color: rgba(79, 140, 255, 0.6);
      }
      button {
        width: 100%;
        padding: 7px;
        margin-bottom: 6px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        border-radius: 8px;
        color: #fff;
        font: inherit;
        font-size: 12px;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      button:active {
        background: rgba(255, 255, 255, 0.22);
      }
      #leaveBtn {
        background: transparent;
        color: #f0806a;
        border: 1px solid rgba(240, 128, 106, 0.35);
      }
      #leaveBtn:hover {
        background: rgba(240, 128, 106, 0.1);
      }
      #openHostPageBtn {
        background: rgba(79, 140, 255, 0.16);
        color: #cfe0ff;
        border: 1px solid rgba(79, 140, 255, 0.35);
      }
      #openHostPageBtn:hover {
        background: rgba(79, 140, 255, 0.26);
      }
      #status {
        font-size: 12px;
        color: #cfcfcf;
        white-space: pre-line;
      }
      .room-code-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin: 4px 0 10px;
      }
      #roomCode {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 2px;
        color: #fff;
      }
      #copyCodeBtn {
        width: auto;
        margin-bottom: 0;
        padding: 4px 7px;
        font-size: 13px;
        color: #ccc;
      }
      label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #cfcfcf;
      }
      .hidden {
        display: none;
      }
      details {
        margin-top: 10px;
        font-size: 11px;
      }
      summary {
        cursor: pointer;
        color: #888;
      }
      #debugDump {
        white-space: pre-wrap;
        word-break: break-all;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        padding: 6px;
        margin-top: 6px;
        max-height: 200px;
        overflow-y: auto;
        color: #b8b8b8;
      }
    </style>
  </head>
  <body>
    <h1>SSynch</h1>

    <section id="noRoom">
      <button id="createBtn">Create room</button>
      <input id="joinCodeInput" placeholder="Room code" maxlength="6" />
      <button id="joinBtn">Join room</button>
    </section>

    <section id="inRoom" class="hidden">
      <div class="room-code-row">
        <div id="roomCode"></div>
        <button id="copyCodeBtn" title="Copy room code">⧉</button>
      </div>
      <button id="pickBtn">Select video on this page</button>
      <label id="autoFollowRow" class="hidden">
        <input type="checkbox" id="autoFollowCheck" />
        Auto-follow host to new pages
      </label>
      <button id="openHostPageBtn" class="hidden">Open host's page</button>
      <button id="leaveBtn">Leave room</button>
    </section>

    <div id="status"></div>

    <details>
      <summary>Debug info</summary>
      <pre id="debugDump"></pre>
    </details>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
