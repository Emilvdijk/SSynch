<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SSynch</title>
    <style>
      body {
        font: 13px/1.4 system-ui, sans-serif;
        width: 260px;
        margin: 0;
        padding: 12px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      section {
        margin-bottom: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid #e2e2e2;
      }
      section:last-child {
        border-bottom: none;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
        margin-bottom: 6px;
      }
      button {
        width: 100%;
        padding: 6px;
        margin-bottom: 6px;
        cursor: pointer;
      }
      #status {
        font-size: 12px;
        color: #444;
        white-space: pre-line;
      }
      #roomCode {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 2px;
        text-align: center;
        margin: 6px 0;
      }
      label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
      }
      .hidden {
        display: none;
      }
      details {
        margin-top: 10px;
        font-size: 11px;
      }
      summary {
        cursor: pointer;
        color: #666;
      }
      #debugDump {
        white-space: pre-wrap;
        word-break: break-all;
        background: #f5f5f5;
        border: 1px solid #e2e2e2;
        border-radius: 4px;
        padding: 6px;
        margin-top: 6px;
        max-height: 200px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <h1>SSynch</h1>

    <section id="noRoom">
      <button id="createBtn">Create room</button>
      <input id="joinCodeInput" placeholder="Room code" maxlength="6" />
      <button id="joinBtn">Join room</button>
    </section>

    <section id="inRoom" class="hidden">
      <div id="roomCode"></div>
      <button id="pickBtn">Select video on this page</button>
      <label id="autoFollowRow" class="hidden">
        <input type="checkbox" id="autoFollowCheck" />
        Auto-follow host to new pages
      </label>
      <button id="openHostPageBtn" class="hidden">Open host's page</button>
      <button id="leaveBtn">Leave room</button>
    </section>

    <div id="status"></div>

    <details>
      <summary>Debug info</summary>
      <pre id="debugDump"></pre>
    </details>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
